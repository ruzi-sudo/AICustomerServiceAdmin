version: "3.8"

services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.db
      args:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    container_name: pureadmin-db
    ports:
      - "3306:3306"
    env_file:
      - .env.db
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
